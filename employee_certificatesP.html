<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #EEF5F6;
            color: #000;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: #EEF5F6;
            border-bottom: 1px solid #ccc;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 400;
            gap: 10px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        nav button {
            background: none;
            border: none;
            font-size: 14px;
            font-family: 'Helvetica Neue', sans-serif;
            color: #000;
            cursor: pointer;
        }

        nav button img {
            height: 18px;
            width: 18px;
        }

        .dashboard {
            margin: 50px auto;
            width: 80%;
        }

        .dashboard h1 {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .dashboard h1 button {
            font-size: 14px;
            color: #7676EA;
            background-color: transparent;
            border: none;
            cursor: pointer;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            position: relative;
            cursor: pointer;
        }

        .card img {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            box-sizing: border-box;
        }

        .modal.active {
            display: block;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 24px;
            color: #7575EA;
            margin-bottom: 20px;
            border-bottom: 1px solid #ccc;
        }

        .modal-header .edit-icon {
            margin-left: 10px;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-header .edit-icon img {
            width: 20px;
            height: 20px;
        }

        .modal-header .edit-icon:hover {
            background-color: #A6D9DE;
        }

        .modal-body {
            text-align: center;
        }

        .modal-body button {
            padding: 15px;
            font-size: 16px;
            background-color: #CBEDED;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .modal-body button:hover {
            background-color: #A6D9DE;
        }

        .confirmation-modal .checkmark {
            font-size: 48px;
            color: #46CDCF;
            margin-bottom: 20px;
        }

        .confirmation-modal p {
            font-size: 20px;
            font-weight: bold;
            color: #000;
        }

        .decorative-element {
            position: absolute;
            bottom: 40px;
            right: 40px;
        }

        .decorative-element img {
            height: 200px;
        }
    </style>
</head>
<body>
<header>
    <div class="logo">
        <img src="logo1.png" alt="Logo" style="height: 25px;">
        StaffSync
    </div>
    <nav>
        <button onclick="location.href='index.html'">HOME</button>
        <button onclick="alert('Support coming soon!')">SUPPORT</button>
        <button>
            <img src="globe_icon.png" alt="Globe">
        </button>
        <button onclick="location.href='profile.html'">
            <img src="profile_icon.png" alt="Profile">
        </button>
    </nav>
</header>

<div class="dashboard">
    <h1>ahmad a <button onclick="showAddFileModal()">+</button></h1>
    <div class="cards-container">
        <div class="card" onclick="showCertificateViewer('BLS')">
            BLS
            <img src="date.png" alt="Date Icon">
        </div>
        <div class="card" onclick="showCertificateViewer('ACLS')">
            ACLS
            <img src="dated.png" alt="Dated Icon">
        </div>
        <div class="card" onclick="showCertificateViewer('AC')">
            AC
            <img src="date.png" alt="Date Icon">
        </div>
        <div class="card" onclick="showCertificateViewer('CV')">
            CV
            <img src="dated.png" alt="Dated Icon">
        </div>
        <div class="card" onclick="showCertificateViewer('E C')">
            E C
            <img src="date.png" alt="Date Icon">
        </div>
    </div>
</div>

<div class="decorative-element">
    <img src="logo2.png" alt="Decorative Element">
</div>

<!-- Certificate Viewer -->
<div class="modal" id="certificateViewer">
    <div class="modal-header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="certificateTitle"></span>
            <div class="edit-icon" onclick="editCertificate()">
                <img src="edi.png" alt="Edit Icon">
            </div>
        </div>
        <span class="close" onclick="hideCertificateViewer()">×</span>
    </div>
    <div class="modal-body">
        <img src="certificate_sample.png" alt="Certificate Sample" style="width: 100%; border-radius: 10px;">
    </div>
</div>

<!-- Add File Modal -->
<div class="modal" id="addFileModal">
    <div class="modal-header">
        <span>UPDATE FILE</span>
        <span class="close" onclick="hideAddFileModal()">×</span>
    </div>
    <div class="modal-body">
        <button onclick="showConfirmationModal()">UPLOAD FILE</button>
    </div>
</div>

<!-- Confirmation Modal -->
<div class="modal confirmation-modal" id="confirmationModal">
    <div class="modal-header">
        <span>UPDATE FILE</span>
        <span class="close" onclick="hideConfirmationModal()">×</span>
    </div>
    <div class="modal-body">
        <div class="checkmark">✔</div>
        <p>Updated</p>
    </div>
</div>

<script>
    function showCertificateViewer(title) {
        document.getElementById('certificateTitle').innerText = title;
        document.getElementById('certificateViewer').classList.add('active');
    }

    function hideCertificateViewer() {
        document.getElementById('certificateViewer').classList.remove('active');
    }

    function showAddFileModal() {
        document.getElementById('addFileModal').classList.add('active');
    }

    function hideAddFileModal() {
        document.getElementById('addFileModal').classList.remove('active');
    }

    function showConfirmationModal() {
        hideAddFileModal();
        document.getElementById('confirmationModal').classList.add('active');
    }

    function hideConfirmationModal() {
        document.getElementById('confirmationModal').classList.remove('active');
    }

    function editCertificate() {
        alert("Edit Certificate functionality triggered.");
    }
</script>
</body>
</html>
