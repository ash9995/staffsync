<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad (Contact)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #EEF5F6;
            color: #000;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: #EEF5F6;
            border-bottom: 1px solid #ccc;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 400;
            gap: 10px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        nav button {
            background: none;
            border: none;
            font-size: 14px;
            font-family: 'Helvetica Neue', sans-serif;
            color: #000;
            cursor: pointer;
        }

        nav button img {
            height: 18px;
            width: 18px;
        }

        .dashboard {
            margin: 100px auto;
            width: 80%;
            text-align: left;
        }

        .dashboard h1 {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .dashboard button.contact-btn {
            font-size: 14px;
            font-weight: normal;
            padding: 5px 10px;
            background-color: transparent;
            border: none;
            color: #7676EA;
            text-transform: uppercase;
            cursor: pointer;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 cards per row */
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .card img {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
        }

                .decorative-element {
            position: absolute;
            bottom: 40px;
            right: 40px;
        }

        .decorative-element img {
            height: 200px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: left;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal.active {
            display: block;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 24px;
            color: #7575EA;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .modal-header .close {
            font-size: 18px;
            cursor: pointer;
            color: #000;
        }

        .modal-body {
            text-align: center;
        }

         .modal-body textarea {
            display: block;
            width: calc(100% - 20px);
            padding: 10px;
            margin: 10px 0;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: none;
        }


        .modal-body input {
            display: block;
            width: calc(100% - 20px);
            padding: 10px;
            margin: 10px 0;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 5px;
           
        }

        .modal-footer {
            text-align: right;
            margin-top: 20px;
        }

        .modal-footer button {
            padding: 10px 20px;
            font-size: 14px;
            background-color: #46CDCF;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .modal-footer button:hover {
            background-color: #a6d9de;
        }

        .confirmation-modal .checkmark {
            font-size: 48px;
            color: #CBEDED;
            margin-bottom: 20px;
        }

        .confirmation-modal p {
            font-size: 20px;
            font-weight: bold;
            color: #000;
        }
    </style>
</head>
<body>
<header>
    <div class="logo">
        <img src="logo1.png" alt="Logo" style="height: 25px;">
        StaffSync
    </div>
    <nav>
        <button onclick="location.href='index.html'">HOME</button>
        <button onclick="alert('Support coming soon!')">SUPPORT</button>
        <button>
            <img src="globe_icon.png" alt="Globe">
        </button>
        <button onclick="location.href='profile.html'">
            <img src="profile_icon.png" alt="Profile">
        </button>
    </nav>
</header>

<div class="dashboard">
    <h1>ahmad a <button class="contact-btn" onclick="showModal()">CONTACT</button></h1>
    <div class="cards-container">
        <div class="card">
            <span>BLS</span>
            <img src="date.png" alt="Date Icon">
        </div>
        <div class="card">
            <span>ACLS</span>
            <img src="dated.png" alt="Dated Icon">
        </div>
        <div class="card">
            <span>AC</span>
            <img src="date.png" alt="Date Icon">
        </div>
        <div class="card">
            <span>ECV</span>
            <img src="dated.png" alt="Dated Icon">
        </div>
        <div class="card">
            <span>EC</span>
            <img src="date.png" alt="Date Icon">
        </div>
    </div>
</div>

<div class="decorative-element">
    <img src="logo2.png" alt="Decorative Element">
</div>

<!-- Contact Modal -->
<div class="modal" id="contactModal">
    <div class="modal-header">
        <span>CONTACT</span>
        <span class="close" onclick="hideModal()">×</span>
    </div>
    <div class="modal-body">
        <label for="message">Message</label>
        <textarea id="message" rows="5" maxlength="300"></textarea>
        <div style="text-align: right;">0/300</div>
        <input type="text" placeholder="Date">
        <input type="text" placeholder="Time">
    </div>
    <div class="modal-footer">
        <button onclick="showConfirmation()">Send</button>
    </div>
</div>

<!-- Confirmation Modal -->
<div class="modal confirmation-modal" id="confirmationModal">
    <div class="modal-header">
        <span>CONTACT</span>
        <span class="close" onclick="hideConfirmation()">×</span>
    </div>
    <div class="modal-body">
        <div class="checkmark">✔</div>
        <p>Sent</p>
    </div>
</div>

<script>
    function showModal() {
        document.getElementById('contactModal').classList.add('active');
    }

    function hideModal() {
        document.getElementById('contactModal').classList.remove('active');
    }

    function showConfirmation() {
        hideModal();
        document.getElementById('confirmationModal').classList.add('active');
    }

    function hideConfirmation() {
        document.getElementById('confirmationModal').classList.remove('active');
    }
</script>
</body>
</html>
