<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>employee_files</title>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #EEF5F6;
            color: #000;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: #EEF5F6;
            border-bottom: 1px solid #ccc;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 400;
            gap: 10px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        nav button {
            background: none;
            border: none;
            font-size: 14px;
            font-family: 'Helvetica Neue', sans-serif;
            color: #000;
            cursor: pointer;
        }

        nav button img {
            height: 18px;
            width: 18px;
        }

        .dashboard {
            text-align: left;
            margin: 100px 60px;
        }

        .dashboard .headline {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .dashboard h1 {
            font-size: 60px;
            font-weight: bold;
            color: #000;
            margin: 0;
        }

        .dashboard h2 {
            font-size: 24px;
            font-weight: normal;
            color: #7575EA;
            margin: 0;
        }

        .input-field {
            margin-bottom: 20px;
            position: relative;
        }

        .input-field select {
            width: 350px;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            background-color: #CBEDED;
            font-family: 'Helvetica Neue', sans-serif;
            color: #000;
            appearance: none;
            text-align: left;
            cursor: pointer;
        }

        .input-field select:focus {
            outline: none;
        }

        .input-field::after {
            content: '▼';
            font-size: 14px;
            position: absolute;
           Left: 140px;
            top: 50%;
            transform: translateY(-50%);
            color: #000;
        }

        .search-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 16px;
            background-color: #46CDCF;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
        }

        .search-button:hover {
            background-color: #a6d9de;
        }

        .decorative-element {
            position: absolute;
            bottom: 40px;
            right: 40px;
        }

        .decorative-element img {
            height: 200px; /* Restored original size */
        }
    </style>
</head>
<body>
<header>
    <div class="logo">
        <img src="logo1.png" alt="Logo" style="height: 25px;">
        StaffSync
    </div>
    <nav>
        <button onclick="location.href='index.html'">HOME</button>
        <button onclick="alert('Support coming soon!')">SUPPORT</button>
        <button>
            <img src="globe_icon.png" alt="Globe">
        </button>
        <button onclick="location.href='profile.html'">
            <img src="profile_icon.png" alt="Profile">
        </button>
    </nav>
</header>

<div class="dashboard">
    <div class="headline">
        <h1>MD</h1>
        <h2>Employee Files</h2>
    </div>
    <div class="input-field">
        <select id="name" name="name">
            <option value="" disabled selected>Name</option>
            <option value="Abdullaziz"> Abdullaziz </option>
            <option value="Ahmad"> Ahmad </option>
            <option value="Aisha">Aisha Johnson</option>
        </select>
    </div>
    <div class="input-field">
        <select id="department" name="department">
            <option value="" disabled selected>Department</option>
            <option value="surgery">surgery</option>
            <option value="lap">lap</option>
            <option value="Urology">Urology</option>
        </select>
    </div>
    <button class="search-button" onclick="location.href='employee_certificates.html'">Search</button>
</div>

<div class="decorative-element">
    <img src="logo2.png" alt="Decorative Element">
</div>
</body>
</html>
