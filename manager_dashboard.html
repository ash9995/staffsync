<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>manager (Dashboard)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #EEF5F6;
            color: #000;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: #EEF5F6;
            border-bottom: 1px solid #ccc;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 400;
            gap: 10px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        nav button {
            background: none;
            border: none;
            font-size: 14px;
            font-family: 'Helvetica Neue', sans-serif;
            color: #000;
            cursor: pointer;
        }

        nav button img {
            height: 18px;
            width: 18px;
        }

        .dashboard {
            text-align: left;
            margin: 100px 60px;
        }

        .dashboard .headline {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .dashboard h1 {
            font-size: 60px;
            font-weight: bold;
            color: #000;
            margin: 0;
        }

        .dashboard h2 {
            font-size: 24px;
            font-weight: normal;
            color: #7575EA;
            margin: 0;
        }

        .dashboard button {
            display: block;
            width: 350px;
            margin: 15px 0;
            padding: 15px;
            font-size: 16px;
            background-color: #46CDCF;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
        }

        .dashboard button:hover {
            background-color: #a6d9de;
        }

        .decorative-element {
            position: absolute;
            bottom: 40px;
            right: 40px;
        }

        .decorative-element img {
            height: 200px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: left;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal.active {
            display: block;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 24px;
            color: #7575EA;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .modal-header .close {
            font-size: 18px;
            cursor: pointer;
            color: #000;
        }

        .modal-body {
            text-align: center;
        }

        .modal-body input {
            display: block;
            width: calc(100% - 20px);
            padding: 10px;
            margin: 10px 0;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .modal-footer {
            text-align: right;
            margin-top: 20px;
        }

        .modal-footer button {
            padding: 10px 20px;
            font-size: 14px;
            background-color: #46CDCF;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .modal-footer button:hover {
            background-color: #a6d9de;
        }

        .confirmation-modal .checkmark {
            font-size: 48px;
            color: #CBEDED;
            margin-bottom: 20px;
        }

        .confirmation-modal p {
            font-size: 20px;
            font-weight: bold;
            color: #000;
        }
    </style>
</head>
<body>
<header>
    <div class="logo">
        <img src="logo1.png" alt="Logo" style="height: 25px;">
        StaffSync
    </div>
    <nav>
        <button onclick="location.href='index.html'">HOME</button>
        <button onclick="alert('Support coming soon!')">SUPPORT</button>
        <button>
            <img src="globe_icon.png" alt="Globe">
        </button>
        <button onclick="location.href='profile.html'">
            <img src="profile_icon.png" alt="Profile">
        </button>
    </nav>
</header>

<div class="dashboard">
    <div class="headline">
        <h1>MD</h1>
        <h2>Medical Director</h2>
    </div>
    <button onclick="location.href='employee_filesM.html'">Employee Files</button>
    <button onclick="showModal()">Request Meeting</button>
</div>

<div class="decorative-element">
    <img src="logo2.png" alt="Decorative Element">
</div>

<!-- Modal for Request Meeting -->
<div class="modal" id="modal">
    <div class="modal-header">
        <span>Request Meeting</span>
        <span class="close" onclick="hideModal()">×</span>
    </div>
    <div class="modal-body">
        <input type="text" placeholder="Place">
        <input type="text" placeholder="NAME">
        <input type="text" placeholder="Date">
        <input type="text" placeholder="Time">
    </div>
    <div class="modal-footer">
        <button onclick="showConfirmation()">Send</button>
    </div>
</div>

<!-- Confirmation Modal -->
<div class="modal confirmation-modal" id="confirmation">
    <div class="modal-header">
        <span>Request Meeting</span>
        <span class="close" onclick="hideConfirmation()">×</span>
    </div>
    <div class="modal-body">
        <div class="checkmark">✔</div>
        <p>Sent</p>
    </div>
</div>

<script>
    function showModal() {
        document.getElementById('modal').classList.add('active');
        document.getElementById('confirmation').classList.remove('active');
    }

    function hideModal() {
        document.getElementById('modal').classList.remove('active');
    }

    function showConfirmation() {
        document.getElementById('modal').classList.remove('active');
        document.getElementById('confirmation').classList.add('active');
    }

    function hideConfirmation() {
        document.getElementById('confirmation').classList.remove('active');
    }
</script>
</body>
</html>
