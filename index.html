<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StaffSync Login</title>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #EEF5F6;
            color: #000;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: #EEF5F6;
            border-bottom: 1px solid #ccc; /* Light gray separator line */
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 400;
            gap: 10px;
        }

        .logo img {
            height: 25px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        nav button {
            background: none;
            border: none;
            font-size: 10px;
            font-family: 'Helvetica Neue', sans-serif;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        nav button img {
            height: 18px; /* Adjusted size to match text */
            width: 18px; /* Keep it proportional */
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto 0;
            text-align: center;
        }

        .login-container h1 {
            font-size: 40px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .login-container label {
            display: block;
            text-align: left;
            margin: 10px 0 5px;
            font-size: 16px;
        }

        .login-container input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px; /* Increased rounding */
            font-size: 16px;
            background: white;
            outline: none;
            box-sizing: border-box;
        }

        .login-container button {
            width: 100%;
            background-color: #46CDCF;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 12px; /* Increased rounding */
            margin-top: 20px;
        }

        .login-container a {
            display: block;
            margin-top: 20px;
            font-size: 16px;
            color: #6D8EBC;
            text-decoration: none;
        }

        footer img {
            position: absolute;
            bottom: 20px;
            right: 20px;
            height: 200px; /* Increased size */
        }
    </style>
</head>
<body style="background-color: #EEF5F6;">
    
<header>
    <div class="logo">
        <img src="logo1.png" alt="Logo">
        StaffSync
    </div>
    <nav>
        <button onclick="location.href='index.html'">HOME</button>
        <button onclick="alert('Support coming soon!')">SUPPORT</button>
        <button>
            <img src="globe_icon.png" alt="Globe">
        </button>
        <button onclick="location.href='profile.html'">
            <img src="profile_icon.png" alt="Profile">
        </button>
    </nav>
</header>

<div class="login-container">
    <h1>Welcome to StaffSync</h1>
    <label for="id">ID Number</label>
    <input type="text" id="id" placeholder="Enter your ID number" name="id">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password" name="password">
    <button onclick="login()">LOG IN</button>
    <a href="#">Forgot your password?</a>
</div>

<footer>
    <img src="logo2.png" alt="Logo 2">
</footer>

<script>
    function login() {
        const id = document.getElementById('id').value;
        const password = document.getElementById('password').value;

        // Check password
        if (password !== '1122') {
            alert('Incorrect password!');
            return;
        }

        // Redirect based on ID
        if (id === '123') {
            location.href = 'hr_dashboard.html';
        } else if (id === '1234') {
            location.href = 'manager_dashboard.html';
        } else if (id === '12345') {
            location.href = 'employee_dashboard.html';
        } else {
            alert('Invalid ID!');
        }
    }
</script>

</body>
</html>
