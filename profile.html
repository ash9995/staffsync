<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #EEF5F6;
            color: #000;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background-color: #EEF5F6;
            border-bottom: 1px solid #ccc;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 400;
            gap: 10px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        nav button {
            background: none;
            border: none;
            font-size: 14px;
            font-family: 'Helvetica Neue', sans-serif;
            color: #000;
            cursor: pointer;
        }

        nav button img {
            height: 18px;
            width: 18px;
        }

        .title {
            font-size: 45px;
            margin: 40px auto 20px;
            color: #000;
            text-align: center;
            font-weight: normal;
        }

        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #ddd;
        }

        .input-group:last-child {
            border-bottom: none;
        }

        .input-group label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .input-group input {
            font-size: 16px;
            font-weight: normal;
            color: #000;
            border: none;
            outline: none;
            background: transparent;
        }

        .input-group input:disabled {
            color: #666;
        }

        .input-group .edit-btn {
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-group .edit-btn img {
            width: 16px;
            height: 16px;
        }

        .input-group .edit-btn:hover {
            background-color: #DDE9F1;
        }

        .decorative-element {
            position: absolute;
            bottom: 40px;
            right: 40px;
        }

        .decorative-element img {
            height: 200px;
        }
    </style>
</head>
<body>
<header>
    <div class="logo">
        <img src="logo1.png" alt="Logo" style="height: 25px;">
        StaffSync
    </div>
    <nav>
        <button onclick="location.href='index.html'">HOME</button>
        <button onclick="alert('Support coming soon!')">SUPPORT</button>
        <button>
            <img src="globe_icon.png" alt="Globe">
        </button>
        <button onclick="location.href='profile.html'">
            <img src="profile_icon.png" alt="Profile">
        </button>
    </nav>
</header>

<div class="title">Hello Ahmad A</div>

<div class="profile-container">
    <div class="input-group">
        <div>
            <label>Name</label>
            <input type="text" value="Ahmad A" disabled>
        </div>
    </div>
    <div class="input-group">
        <div>
            <label>ID number</label>
            <input type="text" value="554342778" disabled>
        </div>
    </div>
    <div class="input-group">
        <div>
            <label>Email</label>
            <input type="email" value="Ahmad A@kjhtfjvb" id="email">
        </div>
        <div class="edit-btn" onclick="enableEdit('email')">
            <img src="edi.png" alt="Edit Icon">
        </div>
    </div>
    <div class="input-group">
        <div>
            <label>Phone No</label>
            <input type="text" value="055567432" id="phone">
        </div>
        <div class="edit-btn" onclick="enableEdit('phone')">
            <img src="edi.png" alt="Edit Icon">
        </div>
    </div>
    <div class="input-group">
        <div>
            <label>Password</label>
            <input type="password" value="************" id="password">
        </div>
        <div class="edit-btn" onclick="enableEdit('password')">
            <img src="edi.png" alt="Edit Icon">
        </div>
    </div>
</div>

<div class="decorative-element">
    <img src="logo2.png" alt="Decorative Element">
</div>

<script>
    function enableEdit(fieldId) {
        const field = document.getElementById(fieldId);
        field.disabled = false;
        field.focus();
    }
</script>
</body>
</html>
